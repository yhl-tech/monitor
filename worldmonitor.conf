server {
    listen 80;
    server_name 117.72.53.195;

    # 静态资源 — 长期缓存（Vite 构建的 hash 文件名，带 /osint/ 前缀）
    location /osint/assets/ {
        alias /www/wwwroot/worldmonitor/assets/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /osint/map-styles/ {
        alias /www/wwwroot/worldmonitor/map-styles/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /osint/data/ {
        alias /www/wwwroot/worldmonitor/data/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /osint/textures/ {
        alias /www/wwwroot/worldmonitor/textures/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # OSINT Intel Hub — 优先匹配（比 /api/ 更具体）
    location /api/osint/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # 本地 API Server — 处理所有 /api/* 路由
    location /api/ {
        proxy_pass http://127.0.0.1:46123/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # AISStream WebSocket — 船舶实时追踪
    location /ws/aisstream {
        proxy_pass https://stream.aisstream.io;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host stream.aisstream.io;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Widget Agent SSE relay
    location /widget-agent {
        proxy_pass https://proxy.worldmonitor.app/widget-agent;
        proxy_http_version 1.1;
        proxy_set_header Host proxy.worldmonitor.app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — /osint/* 返回 index.html
    location /osint/ {
        alias /www/wwwroot/worldmonitor/;
        index index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ @osint_fallback;
    }

    location @osint_fallback {
        root /www/wwwroot/worldmonitor;
        rewrite ^ /index.html break;
    }

    # 根路径重定向到 /osint/
    location = / {
        return 301 /osint/;
    }
}
